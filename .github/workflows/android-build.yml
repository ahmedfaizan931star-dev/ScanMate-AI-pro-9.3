name: ScanMate AI Pro Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - run: chmod +x ./gradlew

      - name: Android lint
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Kotlin formatting
        run: ./gradlew ktlintCheck -x ktlintKotlinScriptCheck --stacktrace

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport --stacktrace

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: app/build/reports/jacoco/jacocoTestReport
          if-no-files-found: ignore

  instrumented-tests:
    name: instrumented tests on emulator
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - run: chmod +x ./gradlew

      - name: Run emulator tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace

  build-debug-apk:
    name: build debug APK
    runs-on: ubuntu-latest
    needs: instrumented-tests
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-signed-release:
    name: build signed release APK/AAB
    runs-on: ubuntu-latest
    needs: build-debug-apk
    timeout-minutes: 35
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - run: chmod +x ./gradlew

      - name: Run release candidate sanity checks
        run: bash scripts/verify_release_candidate.sh

      - name: Validate release signing secrets
        shell: bash
        run: |
          set -euo pipefail
          STORE_PASSWORD_VALUE="${KEY_STORE_PASSWORD:-${STORE_PASSWORD:-}}"
          missing=0
          KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64:-${SIGNING_KEY:-}}"

          for name in KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub secret $name"
              missing=1
            fi
          done

          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "::error::Missing GitHub secret ANDROID_KEYSTORE_BASE64 (or legacy SIGNING_KEY)"
            missing=1
          fi

          if [[ -z "$STORE_PASSWORD_VALUE" ]]; then
            echo "::error::Missing GitHub secret KEY_STORE_PASSWORD"
            missing=1
          fi

          [[ "$missing" -eq 0 ]]
          echo "SCANMATE_STORE_PASSWORD=$STORE_PASSWORD_VALUE" >> "$GITHUB_ENV"
          echo "SCANMATE_REQUIRE_RELEASE_SIGNING=true" >> "$GITHUB_ENV"

      - name: Decode release keystore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p app/keystore
          KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64:-${SIGNING_KEY:-}}"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore/scanmate-release.jks
          test -s app/keystore/scanmate-release.jks

      - name: Validate keystore alias
        run: |
          keytool -list \
            -keystore app/keystore/scanmate-release.jks \
            -storepass "$SCANMATE_STORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -v >/dev/null

      - name: Build signed release APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace
        env:
          KEYSTORE_PATH: keystore/scanmate-release.jks

      - name: Verify release APK signature
        shell: bash
        run: |
          set -euo pipefail
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose app/build/outputs/apk/release/*.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-apk-signed
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-aab-signed
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
