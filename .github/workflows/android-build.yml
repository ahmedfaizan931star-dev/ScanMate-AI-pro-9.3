name: ScanMate AI Pro Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Build APK and AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare release signing if secrets exist
        shell: bash
        run: |
          set -euo pipefail

          KEYSTORE_BASE64="${ANDROID_KEYSTORE_BASE64:-${SIGNING_KEY:-}}"
          STORE_PASSWORD_VALUE="${KEY_STORE_PASSWORD:-${STORE_PASSWORD:-}}"

          if [[ -n "$KEYSTORE_BASE64" && -n "${KEY_ALIAS:-}" && -n "${KEY_PASSWORD:-}" && -n "$STORE_PASSWORD_VALUE" ]]; then
            echo "Release signing secrets found. Building signed release."
            mkdir -p app/keystore
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/keystore/scanmate-release.jks
            test -s app/keystore/scanmate-release.jks
            echo "SCANMATE_STORE_PASSWORD=$STORE_PASSWORD_VALUE" >> "$GITHUB_ENV"
            echo "SCANMATE_REQUIRE_RELEASE_SIGNING=true" >> "$GITHUB_ENV"
            echo "KEYSTORE_PATH=keystore/scanmate-release.jks" >> "$GITHUB_ENV"
          else
            echo "Release signing secrets not complete. Building unsigned release artifacts only."
            echo "SCANMATE_REQUIRE_RELEASE_SIGNING=false" >> "$GITHUB_ENV"
          fi

      - name: Build release APK and AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --stacktrace

      - name: Verify release APK signature if signed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${SCANMATE_REQUIRE_RELEASE_SIGNING:-false}" == "true" ]]; then
            BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
            "$BUILD_TOOLS_DIR/apksigner" verify --verbose app/build/outputs/apk/release/*.apk
          else
            echo "Skipping signature verification because signed release secrets were not complete."
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
