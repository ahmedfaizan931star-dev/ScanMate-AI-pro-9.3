name: Build ScanMate AI Pro

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Debug + Signed Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Validate signing secrets
        run: |
          test -n "$SIGNING_KEY" || (echo "Missing SIGNING_KEY" && exit 1)
          test -n "$KEY_STORE_PASSWORD" || (echo "Missing KEY_STORE_PASSWORD" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Missing KEY_ALIAS" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Missing KEY_PASSWORD" && exit 1)
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Decode release keystore
        run: |
          mkdir -p app/keystore
          echo "$SIGNING_KEY" | base64 --decode > app/keystore/scanmate-release.jks
          ls -lh app/keystore/scanmate-release.jks
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: keystore/scanmate-release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Signed Release AAB
        run: ./gradlew bundleRelease --stacktrace
        env:
          KEYSTORE_PATH: keystore/scanmate-release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify Release APK Signature
        run: |
          APK_FILE="$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)"
          if [ -z "$APK_FILE" ]; then
            echo "No release APK found"
            exit 1
          fi
          echo "Verifying: $APK_FILE"
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose "$APK_FILE"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-signed-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-signed-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
