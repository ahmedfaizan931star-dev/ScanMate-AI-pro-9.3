name: Build ScanMate AI Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Prepare Release Keystore Directory
        run: mkdir -p app/keystore

      - name: Decode Keystore
        if: ${{ secrets.SIGNING_KEY != '' }}
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/keystore/scanmate-release.jks

      - name: Build Release APK (Signed)
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: keystore/scanmate-release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Release AAB (Signed)
        run: ./gradlew bundleRelease --stacktrace
        env:
          KEYSTORE_PATH: keystore/scanmate-release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify APK Signature
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify \
            --verbose \
            app/build/outputs/apk/release/*.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ScanMate-AI-Pro-release-aab
          path: app/build/outputs/bundle/release/*.aab
